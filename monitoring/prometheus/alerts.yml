groups:
  - name: fastapi-alerts
    rules:
      - alert: AppDown
        expr: up{job="fastapi-app"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "FastAPI app is down"
          description: "The FastAPI application has not been reachable for 30 seconds."

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum(rate(app_request_latency_seconds_bucket[1m])) by (le)) > 0.5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "95th percentile latency is above 0.5 seconds for over 1 minute."

      - alert: TrafficSpike
        expr: rate(app_request_count_total[2m]) > 20
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Unusual traffic spike"
          description: "The request rate is unusually high compared to normal baseline."

  - name: blackbox-alerts
    rules:
      - alert: BlackboxProbeFailed
        expr: probe_success == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Blackbox probe failed"
          description: "The external endpoint is unreachable."

  - name: prometheus-alerts
    rules:
      - alert: PrometheusTargetMissing
        expr: up == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target down"
          description: "A Prometheus scrape target is down."
